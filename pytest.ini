[pytest]
asyncio_mode = strict
testpaths = tests
python_files = test_*.py
addopts = -v --tb=short
markers =
    integration: marks tests as integration tests requiring external services
filterwarnings =
    ignore::RuntimeWarning:pydantic.main
    ignore::DeprecationWarning:supabase
    ignore::jwt.warnings.InsecureKeyLengthWarning

