[tool.ruff]
line-length = 88
target-version = "py312"

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
strict = true

[[tool.mypy.overrides]]
module = [
    "app.database",
    "app.routes.auth",
    "app.routes.oauth",
    "app.routes.proxy"
]
ignore_errors = true

[[tool.mypy.overrides]]
module = [
    "conftest",
    "test_auth",
    "test_crypto",
    "test_database",
    "test_logging_config",
    "test_models",
    "test_proxy",
    "test_proxy_integration",
    "test_sql_migrations",
]
ignore_errors = true
