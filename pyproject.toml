[tool.ruff]
line-length = 88
target-version = "py312"

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
strict = true

# The four modules below sit directly on the (untyped) Supabase client, whose
# query/execute results are inferred as arbitrary JSON (`Mapping[str, JSON]`).
# That boundary produces a flood of false-positive errors that we cannot fix
# without losing the dynamic query API. We therefore silence ONLY the codes
# that originate at that boundary, and keep all other strict checks enabled so
# genuine mistakes (e.g. undefined names, dead `# type: ignore`s) still fail
# the build. Prefer narrowing these further (typed wrappers around Supabase
# calls) over expanding this list.
[[tool.mypy.overrides]]
module = [
    "app.database",
    "app.routes.auth",
    "app.routes.oauth",
    "app.routes.proxy",
]
disable_error_code = [
    "union-attr",
    "arg-type",
    "index",
    "operator",
    "call-overload",
    "type-arg",
    "return-value",
    "assignment",
    "no-untyped-def",
]
