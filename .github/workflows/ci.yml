name: SafeRoute API CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  ENVIRONMENT: testing

jobs:
  # ── Lint ────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Ruff lint check
        run: ruff check app/ tests/

      - name: Ruff format check
        run: ruff format --check app/ tests/

  # ── Type-check ──────────────────────────────
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Mypy
        run: mypy app/ --ignore-missing-imports

  # ── Test ────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [lint]
    env:
      SUPABASE_URL: "https://placeholder.supabase.co"
      SUPABASE_KEY: "placeholder-anon-key"
      SUPABASE_SERVICE_ROLE_KEY: "placeholder-service-role-key"
      API_KEY_SALT: "placeholder-salt-for-ci"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests with coverage
        run: pytest tests/ -v --cov=app --cov-report=term-missing --cov-fail-under=80

  # ── Security ────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Check for hardcoded secrets
        run: |
          # Scan the full diff (both PR and push) for high-signal secret
          # patterns. We deliberately avoid naive keyword greps ("key",
          # "secret", "token") that false-positive on ordinary code such as
          # API_KEY_SALT or ENCRYPTION_KEY references. Instead we match
          # assignment of obviously sensitive material: long high-entropy
          # strings, private-key blocks, and provider-specific secret
          # prefixes. A hit is a real signal, not noise.
          git fetch --quiet origin "${GITHUB_BASE_REF:-main}" || true
          BASE="origin/${GITHUB_BASE_REF:-main}"
          if git rev-parse --verify "$BASE" >/dev/null 2>&1; then
            RANGE="$BASE..HEAD"
          else
            RANGE="HEAD~1..HEAD"
          fi
          if git diff --diff-filter=ACMR --name-only $RANGE \
            | grep -E '\.(py|ts|tsx|js|json|yml|yaml|toml|env|example)$' \
            | xargs grep -nEi \
              -e '-----BEGIN (RSA|EC|OPENSSH|PGP|DSA)? ?PRIVATE KEY-----' \
              -e '(password|passwd|client_secret|api[_-]?key|secret|token|access[_-]?key)\s*[:=]\s*["'\'']?[A-Za-z0-9+/]{32,}={0,2}["'\'']?' \
              -e '(sk|rk|AKIA|ghp|gho|ght|ghu|github_pat|glpat|xox[baprs]-|ya29\.|AIza)[0-9A-Za-z_-]{20,}' \
              2>/dev/null; then
            echo "Potential hardcoded secret found in diff."
            echo "Please move the value to an environment variable / secret store."
            exit 1
          fi
          echo "No obvious hardcoded secrets detected."

      - name: Audit dependencies with pip-audit
        run: |
          # Free, OSS dependency vulnerability scanner. Runs report-only
          # (does not auto-modify requirements) and prints findings. Failing
          # the build on a newly disclosed transitive CVE is opt-in via the
          # fail-on flag; default keeps CI green while surfacing risk.
          pip install pip-audit
          pip-audit -r requirements.txt -r requirements-dev.txt --desc on || true

  # ── Build ───────────────────────────────────
  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: cd frontend && npm ci && npm run build

      - name: Build Docker image
        run: docker build -t saferoute-api:test .
