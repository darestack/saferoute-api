services:
  postgres:
    image: postgres:16-alpine
    container_name: saferoute-postgres
    environment:
      POSTGRES_USER: saferoute
      POSTGRES_PASSWORD: saferoute
      POSTGRES_DB: saferoute
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
