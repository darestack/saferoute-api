<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Changelog | SafeRoute</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        safe: {
                            bg: '#0a0e17',
                            surface: '#0f172a',
                            card: '#1e293b',
                            border: '#334155',
                            accent: '#10b981',
                            accent2: '#06b6d4',
                            text: '#f8fafc',
                            muted: '#94a3b8',
                            danger: '#f43f5e',
                            warning: '#f59e0b',
                        }
                    },
                    fontFamily: {
                        display: ['Space Grotesk', 'sans-serif'],
                        body: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-safe-bg text-safe-text font-body antialiased">
    <div class="min-h-screen">
        <header class="sticky top-0 z-30 bg-safe-bg/80 backdrop-blur-md border-b border-safe-border/50">
            <div class="flex items-center justify-between h-16 px-4 sm:px-6 lg:px-8">
                <div class="flex items-center gap-4">
                    <a href="/" class="flex items-center gap-2">
                        <img src="/images/logo.png" alt="SafeRoute" class="h-8 w-8" onerror="this.style.display='none'">
                        <span class="font-display font-bold text-xl">SafeRoute</span>
                    </a>
                    <span class="text-safe-muted">/</span>
                    <span class="font-display font-bold text-xl">Changelog</span>
                </div>
                <div class="flex items-center gap-4">
                    <a href="/dashboard.html" class="px-4 py-2 rounded-lg border border-safe-border hover:border-safe-accent/50 transition-colors font-medium text-sm">
                        Dashboard
                    </a>
                </div>
            </div>
        </header>

        <main class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
            <div class="mb-8">
                <h1 class="font-display text-4xl font-bold mb-4">Changelog</h1>
                <p class="text-safe-muted text-lg">All notable changes to SafeRoute API are documented here.</p>
            </div>

            <div id="changelog-content" class="space-y-12">
                <div class="text-center py-12">
                    <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-safe-accent mb-4"></div>
                    <p class="text-safe-muted">Loading changelog...</p>
                </div>
            </div>
        </main>

        <footer class="border-t border-safe-border mt-12">
            <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
                <p class="text-safe-muted text-sm text-center">
                    SafeRoute API is released under the MIT License.
                </p>
            </div>
        </footer>
    </div>

    <script>
        async function loadChangelog() {
            const container = document.getElementById('changelog-content');
            try {
                const response = await fetch('https://raw.githubusercontent.com/darestack/saferoute-api/main/CHANGELOG.md');
                if (!response.ok) {
                    throw new Error('Failed to load changelog');
                }
                const text = await response.text();
                container.innerHTML = renderMarkdown(text);
            } catch (error) {
                container.innerHTML = `
                    <div class="bg-safe-card rounded-xl p-8 border border-safe-border text-center">
                        <p class="text-safe-danger mb-4">Failed to load changelog.</p>
                        <a href="https://github.com/darestack/saferoute-api/blob/main/CHANGELOG.md" class="text-safe-accent hover:underline">View on GitHub</a>
                    </div>
                `;
            }
        }

        function renderMarkdown(text) {
            const lines = text.split('\n');
            let html = '';
            let inList = false;
            let listType = '';

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i];

                if (line.startsWith('# ')) {
                    if (inList) { html += listType === 'ul' ? '</ul>' : '</ol>'; inList = false; }
                    html += `<h1 class="font-display text-3xl font-bold mb-4">${escapeHtml(line.slice(2))}</h1>`;
                } else if (line.startsWith('## ')) {
                    if (inList) { html += listType === 'ul' ? '</ul>' : '</ol>'; inList = false; }
                    html += `<h2 class="font-display text-2xl font-bold mb-3 mt-8">${escapeHtml(line.slice(3))}</h2>`;
                } else if (line.startsWith('### ')) {
                    if (inList) { html += listType === 'ul' ? '</ul>' : '</ol>'; inList = false; }
                    html += `<h3 class="font-display text-xl font-bold mb-2 mt-6">${escapeHtml(line.slice(4))}</h3>`;
                } else if (line.startsWith('- ')) {
                    if (!inList || listType !== 'ul') {
                        if (inList) html += '</ol>';
                        html += '<ul class="list-disc list-inside space-y-1 text-safe-text/90 ml-4">';
                        inList = true;
                        listType = 'ul';
                    }
                    html += `<li>${renderInline(line.slice(2))}</li>`;
                } else if (line.match(/^\d+\. /)) {
                    if (!inList || listType !== 'ol') {
                        if (inList) html += '</ul>';
                        html += '<ol class="list-decimal list-inside space-y-1 text-safe-text/90 ml-4">';
                        inList = true;
                        listType = 'ol';
                    }
                    html += `<li>${renderInline(line.replace(/^\d+\. /, ''))}</li>`;
                } else if (line.trim() === '') {
                    if (inList) { html += listType === 'ul' ? '</ul>' : '</ol>'; inList = false; }
                } else if (line.startsWith('```')) {
                    if (inList) { html += listType === 'ul' ? '</ul>' : '</ol>'; inList = false; }
                    // Skip code blocks for simplicity
                } else {
                    if (inList) { html += listType === 'ul' ? '</ul>' : '</ol>'; inList = false; }
                    html += `<p class="text-safe-muted mb-2">${renderInline(line)}</p>`;
                }
            }

            if (inList) html += listType === 'ul' ? '</ul>' : '</ol>';
            return html;
        }

        function renderInline(text) {
            return escapeHtml(text)
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/`([^`]+)`/g, '<code class="bg-safe-surface px-1 py-0.5 rounded text-sm text-safe-accent2">$1</code>');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        loadChangelog();
    </script>
</body>
</html>
