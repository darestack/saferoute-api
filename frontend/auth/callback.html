<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signing in... | SafeRoute</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .spinner {
            border: 3px solid rgba(16, 185, 129, 0.1);
            border-top-color: #10b981;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-safe-bg text-safe-text min-h-screen flex items-center justify-center">
    <div class="text-center">
        <div class="spinner mx-auto mb-4"></div>
        <h1 class="font-display text-xl font-bold mb-2">Signing you in...</h1>
        <p class="text-safe-muted">Please wait while we complete authentication.</p>
    </div>

    <script>
        (async () => {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');
            const error = params.get('error');
            
            if (error) {
                window.location.href = `/login.html?error=${encodeURIComponent(error)}`;
                return;
            }
            
            if (!code) {
                window.location.href = '/login.html?error=no_code';
                return;
            }
            
            try {
                const response = await fetch('https://saferoute-api.vercel.app/auth/callback', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code })
                });
                
                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.detail || 'Authentication failed');
                }
                
                const data = await response.json();
                localStorage.setItem('saferoute_token', data.access_token);
                if (window.opener && !window.opener.closed) {
                    window.opener.location.href = '/dashboard.html';
                }
                window.close();
                window.location.href = '/dashboard.html';
            } catch (err) {
                window.location.href = `/login.html?error=${encodeURIComponent(err.message)}`;
            }
        })();
    </script>
</body>
</html>
